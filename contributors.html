<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contributors — Maha Bhraman</title>
<style>
:root{
  --gold:#c9a227; --gold-2:#f5d76e;
  --ink:#1a0f08; --parchment:#f5e8d0; --parchment-2:#e8d4a8;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%}
body{
  font-family:'Cormorant Garamond', Georgia, serif;
  background:var(--ink); color:var(--parchment);
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  padding-top:70px;
}
/* ===== GLOBAL NAVIGATION ===== */
.global-nav{position:fixed;top:0;left:0;right:0;z-index:9999;display:flex;justify-content:space-between;align-items:center;padding:12px 40px;background:rgba(10,5,3,.98);border-bottom:1px solid rgba(201,162,39,.3);backdrop-filter:blur(12px)}
.nav-brand{display:flex;align-items:center;gap:12px}
.nav-brand-mark{width:38px;height:38px;border:2px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;color:var(--gold-2);font-size:18px;background:rgba(26,15,8,.7)}
.nav-brand-name{font-family:'Cinzel',serif;letter-spacing:.3em;font-size:12px;color:var(--parchment)}
.nav-links{display:flex;gap:12px}
.nav-link{padding:10px 18px;border:1px solid rgba(201,162,39,.5);background:rgba(26,15,8,.45);color:var(--parchment);font-family:'Helvetica Neue',Arial,sans-serif;font-size:11px;letter-spacing:.25em;text-transform:uppercase;text-decoration:none;cursor:pointer;border-radius:3px;transition:all .3s ease}
.nav-link:hover{background:var(--gold);color:var(--ink);border-color:var(--gold);transform:translateY(-1px)}
/* ===== MAIN CONTENT ===== */
main{max-width:900px;margin:0 auto;padding:60px 40px}
.page-header{text-align:center;margin-bottom:60px}
.page-header h1{font-family:'Cinzel',serif;font-size:clamp(32px,6vw,56px);color:var(--parchment);margin-bottom:12px}
.page-header p{color:var(--parchment-2);font-style:italic;font-size:18px}
.contrib-card{background:linear-gradient(135deg,rgba(58,35,15,.4),rgba(26,15,8,.7));border:1px solid rgba(201,162,39,.3);border-radius:12px;padding:50px 40px;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,.5)}
.contrib-card .lab{color:var(--gold-2);letter-spacing:.5em;font-size:11px;text-transform:uppercase;margin-bottom:16px}
.contrib-card h2{font-family:'Cinzel',serif;font-size:32px;color:var(--parchment);margin-bottom:32px}
.members-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:24px;margin-bottom:36px}
.member{background:rgba(26,15,8,.6);border:1px solid rgba(201,162,39,.2);border-radius:8px;padding:20px;transition:all .3s ease}
.member:hover{background:rgba(201,162,39,.1);border-color:rgba(201,162,39,.4);transform:translateY(-4px)}
.member-name{font-family:'Cinzel',serif;color:var(--parchment);font-size:16px;margin-bottom:6px}
.member-prn{color:var(--parchment-2);font-size:13px;letter-spacing:.15em}
.tagline{color:rgba(245,215,110,.7);font-style:italic;font-size:13px;letter-spacing:.2em;text-transform:uppercase;margin-top:24px;padding-top:24px;border-top:1px solid rgba(201,162,39,.2)}
@media (max-width:768px){
  main{padding:40px 24px}
  .contrib-card{padding:30px 24px}
  .members-grid{grid-template-columns:1fr}
}
</style>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
</head>
<body>
<header class="global-nav">
  <div class="nav-brand"><div class="nav-brand-mark">म</div><div class="nav-brand-name">Maha Bhraman</div></div>
  <nav class="nav-links">
    <a class="nav-link" href="maharashtra-tourism.html">Home</a>
  </nav>
</header>

<main>
  <div class="page-header">
    <h1>Contributor Information</h1>
    <p>Meet the team that brought this heritage journey to life</p>
  </div>

  <section class="contrib-card">
    <div class="lab">A project by</div>
    <h2>Team Maha Bhraman</h2>
    
    <div class="members-grid">
      <div class="member">
        <div class="member-name">Swastik Phapale</div>
        <div class="member-prn">PRN 125B1F212</div>
      </div>
      <div class="member">
        <div class="member-name">Pratik Phapale</div>
        <div class="member-prn">PRN 125B1F210</div>
      </div>
      <div class="member">
        <div class="member-name">Swapnil Jadhav</div>
        <div class="member-prn">PRN 125B1F211</div>
      </div>
      <div class="member">
        <div class="member-name">Sarthak Gandhi</div>
        <div class="member-prn">PRN 125B1F201</div>
      </div>
    </div>

    <div class="tagline">Maha Bhraman · A journey through Maharashtra</div>
  </section>
</main>
</body>
</html>
